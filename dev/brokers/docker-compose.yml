# Single-node Redpanda for Message Brokers (Kafka) E2E tests + local dev.
# Kafka-API compatible, with a built-in Schema Registry and Prometheus metrics —
# everything the otto-brokers E2E exercises, in one container.
#
#   docker compose -f dev/brokers/docker-compose.yml up -d
#   OTTO_BROKERS_E2E=1 cargo test -p otto-brokers --test kafka_e2e -- --ignored --nocapture
#   docker compose -f dev/brokers/docker-compose.yml down -v
#
# Exposed on the host:
#   Kafka            127.0.0.1:19092
#   Schema Registry  http://127.0.0.1:18081
#   Admin + metrics  http://127.0.0.1:19644  (/public_metrics, /metrics)
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: otto-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --default-log-level=warn
      - --kafka-addr=PLAINTEXT://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://127.0.0.1:19092
      - --schema-registry-addr=0.0.0.0:18081
    ports:
      - "19092:19092"
      - "18081:18081"
      - "19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
